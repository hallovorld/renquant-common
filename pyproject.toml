[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "renquant-common"
version = "0.10.0"
description = "Shared RenQuant contracts and pipeline primitives."
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "RenQuant"}]
dependencies = [
  "arch>=6.3",
  "numpy>=1.24",
  "pandas>=2.0",
  # Public API includes ``hmm_regime_labels.compute_hmm_regime_labels()`` which
  # reads parquet via ``pd.read_parquet``. pandas does not bundle an engine,
  # so we list one explicitly — otherwise consumers + CI fail with
  # ``ImportError: Unable to find a usable engine``.
  "pyarrow>=14.0",
  "pydantic>=2.0,<3.0",
  "scipy>=1.10",
  "statsmodels>=0.14",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
